services:
  - type: web
    name: cheeze-store-bot
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SESSION_SECRET
        sync: false
